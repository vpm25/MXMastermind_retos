function compress(file){return new Promise(function(res){var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement("canvas");var ratio=200/img.width;c.width=200;c.height=img.height*ratio;c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",0.5));};img.src=ev.target.result;};r.readAsDataURL(file);});}

// Firebase helpers
async function fbGet(path){var snap=await db.ref(path).once("value");return snap.val();}
async function fbSet(path,val){await db.ref(path).set(val);}
async function fbPush(path,val){await db.ref(path).push(val);}

function App(){
  var [view,sv]=useState("dist");
  var [distId,sDistId]=useState("");
  var [verified,sVerified]=useState(false);
  var [selWeek,sSelWeek]=useState(null);
  var [answers,sAnswers]=useState({});
  var [photos,sPhotos]=useState([]);
  var [done,sDone]=useState(false);
  var [allRes,sAllRes]=useState([]);
  var [myRes,sMyRes]=useState([]);
  var [completed,sCompleted]=useState([]);
  var [hasDraft,sHasDraft]=useState([]);
  var [loading,sLoading]=useState(false);
  var [adminOk,sAdminOk]=useState(false);
  var [adminPw,sAdminPw]=useState("");
  var [err,sErr]=useState("");
  var [msg,sMsg]=useState("");
  var [filter,sFilter]=useState(0);
  var [photoView,sPhotoView]=useState(null);
  var [taps,sTaps]=useState(0);
  var fileRef=useRef(null);

  var loadAll=useCallback(async function(){
    sLoading(true);
    try{var data=await fbGet("responses");if(data){var arr=Object.values(data);sAllRes(arr);}else sAllRes([]);}catch(e){sAllRes([]);}
    sLoading(false);
  },[]);

  async function loadMyData(id){
    try{var data=await fbGet("responses");var arr=data?Object.values(data):[];var m=arr.filter(function(x){return x.distId===id;});sMyRes(m);sCompleted(m.map(function(x){return x.weekId;}));}catch(e){sMyRes([]);sCompleted([]);}
    try{var d=await fbGet("drafts/"+id);if(d){sHasDraft(Object.keys(d).map(Number));}else sHasDraft([]);}catch(e){sHasDraft([]);}
  }

  async function loadDraft(id,wid){
    try{var d=await fbGet("drafts/"+id+"/"+wid);if(d&&d.answers)sAnswers(d.answers);}catch(e){}
  }

  async function saveDraft(){
    try{await fbSet("drafts/"+distId.trim()+"/"+selWeek,{answers:answers,at:new Date().toISOString()});sMsg("✓ Avance guardado");sHasDraft(function(p){return p.includes(selWeek)?p:p.concat([selWeek]);});setTimeout(function(){sMsg("");},4000);}catch(e){sMsg("Error: "+(e.message||"intenta de nuevo"));setTimeout(function(){sMsg("");},4000);}
  }

  async function clearDraft(id,wid){try{await db.ref("drafts/"+id+"/"+wid).remove();}catch(e){}}

  useEffect(function(){if(view==="admin"&&adminOk)loadAll();},[view,adminOk,loadAll]);

  function verifyId(){
    var id=distId.trim();
    if(!id){sErr("Ingresa tu ID de distribuidor");return;}
    if(!VALID_IDS.includes(id)){sErr("ID no reconocido. Si tienes algún problema, envía un correo a "+EMAIL);return;}
    sErr("");sLoading(true);loadMyData(id).then(function(){sVerified(true);sLoading(false);});
  }

  function handleSubmit(){
    var week=WEEKS.find(function(w){return w.id===selWeek;});
    if(!week)return;
    if(Object.keys(answers).length<week.tasks.length){sErr("Responde todas las acciones");return;}
    if(photos.length===0){sErr("La evidencia fotográfica es obligatoria (mínimo 1 foto)");return;}
    sErr("");sLoading(true);
    var entry={distId:distId.trim(),weekId:selWeek,answers:week.tasks.map(function(t,i){return{task:t,answer:answers[i]?"Sí":"No"};}),hasPhoto:true,photos:photos,ts:new Date().toISOString()};
    (async function(){
      try{await fbPush("responses",entry);await clearDraft(distId.trim(),selWeek).catch(function(){});sDone(true);}catch(e){sErr("Error al enviar: "+(e.message||"intenta de nuevo"));}
      sLoading(false);
    })();
  }

  function copyForExcel(){
    var f=filter===0?allRes:allRes.filter(function(r){return r.weekId===filter;});
    if(!f.length)return;
    var hd=["ID","Semana","Reto","Acción 1","Acción 2","Acción 3","Foto","Fecha"];
    var rows=f.map(function(r){var w=WEEKS.find(function(x){return x.id===r.weekId;});var a=r.answers.map(function(x){return x.answer;});while(a.length<3)a.push("");return[r.distId,"S"+r.weekId,w?w.title:""].concat(a).concat([r.hasPhoto?"Sí":"No",new Date(r.ts).toLocaleString("es-MX")]);});
    var tsv=[hd].concat(rows).map(function(row){return row.join("\t");}).join("\n");

      <div style={Object.assign({},cs,{marginBottom:16})}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}><div><h2 style={{color:c.text,fontSize:20,margin:0,fontWeight:700}}>Respuestas</h2><p style={{color:c.muted,fontSize:15,margin:"2px 0 0"}}>{filtered.length}/{allRes.length}</p></div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><button onClick={loadAll} style={{padding:"7px 12px",borderRadius:8,border:"1px solid "+c.border,background:"white",color:c.accent,fontSize:14,fontWeight:600,cursor:"pointer"}}>🔄</button><button onClick={copyForExcel} disabled={!filtered.length} style={{padding:"7px 12px",borderRadius:8,border:"none",background:c.green,color:"white",fontSize:14,fontWeight:600,cursor:filtered.length?"pointer":"not-allowed",opacity:filtered.length?1:0.4}}>📋 Copiar para Excel</button><button onClick={function(){if(confirm("¿Borrar TODO?")){db.ref("responses").remove();sAllRes([]);}}} disabled={!allRes.length} style={{padding:"7px 12px",borderRadius:8,border:"1px solid #fca5a5",background:"white",color:c.red,fontSize:14,fontWeight:600,cursor:allRes.length?"pointer":"not-allowed",opacity:allRes.length?1:0.4}}>🗑</button></div></div>
        <div style={{display:"flex",gap:6,marginTop:14,flexWrap:"wrap"}}><button onClick={function(){sFilter(0);}} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(filter===0?c.accent:c.border),background:filter===0?c.accentBg:"white",color:filter===0?c.accent:c.muted,fontSize:14,fontWeight:600,cursor:"pointer"}}>Todas</button>{WEEKS.map(function(w){return<button key={w.id} onClick={function(){sFilter(w.id);}} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(filter===w.id?w.color:c.border),background:filter===w.id?w.color+"15":"white",color:filter===w.id?w.color:c.muted,fontSize:14,fontWeight:600,cursor:"pointer"}}>S{w.id}</button>;})}</div></div>
      {msg&&<div style={Object.assign({},cs,{padding:"10px 16px",marginBottom:16,textAlign:"center",background:msg.startsWith("✅")?c.greenBg:c.redBg,color:msg.startsWith("✅")?c.green:c.red,fontSize:15,fontWeight:600})}>{msg}</div>}
      {loading?<p style={{textAlign:"center",color:c.muted,padding:40}}>Cargando...</p>:filtered.length===0?<div style={Object.assign({},cs,{textAlign:"center",padding:48})}><div style={{fontSize:40,opacity:0.3}}>📭</div><p style={{color:c.muted,fontSize:17,margin:"12px 0 0"}}>Sin respuestas</p></div>:(<div style={{display:"flex",flexDirection:"column",gap:10}}>{filtered.map(function(r,idx){var wk=WEEKS.find(function(x){return x.id===r.weekId;});return(<div key={idx} style={Object.assign({},cs,{padding:16})}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{background:(wk?wk.color:"#3b82f6")+"15",color:wk?wk.color:"#3b82f6",padding:"3px 10px",borderRadius:6,fontSize:13,fontWeight:700}}>S{r.weekId}</span><span style={{color:c.accent,fontSize:17,fontWeight:700}}>#{r.distId}</span></div><span style={{color:c.muted,fontSize:13}}>{new Date(r.ts).toLocaleString("es-MX")}</span></div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{r.answers.map(function(a,ai){return<div key={ai} style={{display:"flex",alignItems:"center",gap:6,background:c.bg,padding:"6px 10px",borderRadius:8,fontSize:14}}><span style={{color:c.muted,fontWeight:600}}>{ai+1}.</span><span style={{padding:"2px 8px",borderRadius:4,fontWeight:700,background:a.answer==="Sí"?c.greenBg:c.redBg,color:a.answer==="Sí"?c.green:c.red,fontSize:13}}>{a.answer}</span></div>;})}{r.hasPhoto&&r.photos&&<button onClick={function(){sPhotoView(r.photos);}} style={{display:"flex",alignItems:"center",gap:4,background:"#fef3c7",padding:"6px 10px",borderRadius:8,fontSize:14,border:"none",cursor:"pointer",color:"#92400e",fontWeight:600}}>📷 {r.photos.length} foto{r.photos.length>1?"s":""}</button>}</div></div>);})}</div>)}
      {photoView&&<div onClick={function(){sPhotoView(null);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}><div style={{background:"white",borderRadius:16,padding:16,maxWidth:500,width:"100%",textAlign:"center",maxHeight:"80vh",overflowY:"auto"}} onClick={function(e){e.stopPropagation();}}>{Array.isArray(photoView)?photoView.map(function(p,i){return <img key={i} src={p} alt={"Foto "+(i+1)} style={{maxWidth:"100%",borderRadius:8,marginBottom:8}}/>;}):<img src={photoView} alt="Evidencia" style={{maxWidth:"100%",borderRadius:8,marginBottom:12}}/>}<button onClick={function(){sPhotoView(null);}} style={{background:c.bg,border:"none",padding:"8px 20px",borderRadius:8,cursor:"pointer",fontSize:15,fontWeight:600,color:c.muted}}>Cerrar</button></div></div>}
    </div></div>);}
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
