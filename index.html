function wSt(w,id){if(id&&GHOST_IDS.indexOf(id)!==-1)return"active";var n=new Date(),s=new Date(w.start+"T00:00:00"),e=new Date(w.end+"T23:59:59");if(n<s)return"locked";if(n>e)return"expired";return"active";}
function isRetoClosed(id){if(id&&GHOST_IDS.indexOf(id)!==-1)return true;return new Date()>new Date(RETO_END+"T23:59:59");}
function calcLeaderboard(responses){
  var gMap={};
  Object.keys(DIST_DATA).forEach(function(id){
    if(ALL_TEST.indexOf(id)!==-1)return;
    var g=DIST_DATA[id].group;
    if(!gMap[g])gMap[g]={name:g,members:[],totalSi:0,ids:[]};
    if(gMap[g].ids.indexOf(id)===-1){gMap[g].ids.push(id);gMap[g].members.push(DIST_DATA[id].name);}
  });
  (responses||[]).forEach(function(r){
    if(ALL_TEST.indexOf(r.distId)!==-1)return;
    var d=DIST_DATA[r.distId];if(!d)return;var g=d.group;if(!gMap[g])return;
    (r.answers||[]).forEach(function(a){if(a.answer==="Sí")gMap[g].totalSi++;});
  });
  var arr=Object.values(gMap);
  arr.forEach(function(g){g.score=g.members.length>0?Math.round((g.totalSi*100)/g.members.length):0;});
  arr.sort(function(a,b){return b.score-a.score||a.name.localeCompare(b.name);});
  return arr;
}

function compress(file){return new Promise(function(res){var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement("canvas");var ratio=200/img.width;c.width=200;c.height=img.height*ratio;c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",0.5));};img.src=ev.target.result;};r.readAsDataURL(file);});}

  function generateLbShare(g,idx){
    var medals=["🥇","🥈","🥉"];
    var glowColors=["#f59e0b","#cbd5e1","#fb923c"];
    var placeText=["¡1er Lugar!","¡2do Lugar!","¡3er Lugar!"];
    var accentColors=["#fbbf24","#e2e8f0","#fdba74"];
    var S=2;
    var logo=new Image();
    logo.onload=function(){
      var bW=950,memberRows=Math.ceil(g.members.length/3);
      var bH=680+memberRows*50;
      var cv=document.createElement("canvas");cv.width=bW*S;cv.height=bH*S;
      var ctx=cv.getContext("2d");ctx.scale(S,S);
      var cx=bW/2;
      var grad=ctx.createLinearGradient(0,0,0,bH);
      grad.addColorStop(0,"#0a0a0a");grad.addColorStop(0.5,"#0f172a");grad.addColorStop(1,"#0a0a0a");
      ctx.fillStyle=grad;ctx.fillRect(0,0,bW,bH);
      var lineGrad=ctx.createLinearGradient(100,0,bW-100,0);
      lineGrad.addColorStop(0,"transparent");lineGrad.addColorStop(0.5,glowColors[idx]);lineGrad.addColorStop(1,"transparent");
      ctx.strokeStyle=lineGrad;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(100,8);ctx.lineTo(bW-100,8);ctx.stroke();
      var lw=460,lh=logo.height*(lw/logo.width);
      ctx.drawImage(logo,(bW-lw)/2,25,lw,lh);
      ctx.textAlign="center";
      ctx.fillStyle="#94a3b8";ctx.font="bold 22px Quicksand,sans-serif";
      ctx.fillText("Primer Reto Mastermind México 2026",cx,lh+65);
      ctx.strokeStyle=lineGrad;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(200,lh+78);ctx.lineTo(bW-200,lh+78);ctx.stroke();
      ctx.font="70px serif";ctx.fillText(medals[idx],cx,lh+148);
      ctx.fillStyle=glowColors[idx];ctx.font="bold 44px Quicksand,sans-serif";

      ctx.fillStyle="#ffffff";ctx.font="bold 36px Quicksand,sans-serif";
      ctx.fillText("Equipo "+g.name,cx,lh+248);
      var badgeW=320,badgeH=36,badgeY=lh+268;
      ctx.fillStyle=glowColors[idx]+"22";
      ctx.beginPath();ctx.roundRect(cx-badgeW/2,badgeY,badgeW,badgeH,18);ctx.fill();
      ctx.fillStyle=accentColors[idx];ctx.font="bold 18px Quicksand,sans-serif";
      ctx.fillText(g.score+" pts/integrante · "+g.members.length+" integrantes",cx,badgeY+24);
      ctx.fillStyle="#64748b";ctx.font="bold 14px Quicksand,sans-serif";
      ctx.fillText("— INTEGRANTES —",cx,lh+340);
      ctx.fillStyle="#e2e8f0";ctx.font="bold 23px Quicksand,sans-serif";
      var startY=lh+378;var cols=3;
      g.members.forEach(function(m,i){var col=i%cols,row=Math.floor(i/cols);ctx.fillText(m,(bW/(cols+1))*(col+1),startY+row*48);});
      ctx.strokeStyle=lineGrad;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(100,bH-50);ctx.lineTo(bW-100,bH-50);ctx.stroke();
      ctx.fillStyle="#475569";ctx.font="15px Quicksand,sans-serif";

  }

        <div style={{display:"flex",gap:6,marginTop:14,flexWrap:"wrap"}}><button onClick={function(){sFilter(0);}} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(filter===0?c.accent:c.border),background:filter===0?c.accentBg:"white",color:filter===0?c.accent:c.muted,fontSize:14,fontWeight:600,cursor:"pointer"}}>Todas</button>{WEEKS.map(function(w){return<button key={w.id} onClick={function(){sFilter(w.id);}} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(filter===w.id?w.color:c.border),background:filter===w.id?w.color+"15":"white",color:filter===w.id?w.color:c.muted,fontSize:14,fontWeight:600,cursor:"pointer"}}>S{w.id}</button>;})}</div></div>
      {msg&&<div style={Object.assign({},cs,{padding:"10px 16px",marginBottom:16,textAlign:"center",background:msg.startsWith("✅")?c.greenBg:c.redBg,color:msg.startsWith("✅")?c.green:c.red,fontSize:15,fontWeight:600})}>{msg}</div>}
      {loading?<p style={{textAlign:"center",color:c.muted,padding:40}}>Cargando...</p>:filtered.length===0?<div style={Object.assign({},cs,{textAlign:"center",padding:48})}><div style={{fontSize:40,opacity:0.3}}>📭</div><p style={{color:c.muted,fontSize:17,margin:"12px 0 0"}}>Sin respuestas</p></div>:(<div style={{display:"flex",flexDirection:"column",gap:10}}>{filtered.map(function(r,idx){var wk=WEEKS.find(function(x){return x.id===r.weekId;});return(<div key={idx} style={Object.assign({},cs,{padding:16})}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{background:(wk?wk.color:"#3b82f6")+"15",color:wk?wk.color:"#3b82f6",padding:"3px 10px",borderRadius:6,fontSize:13,fontWeight:700}}>S{r.weekId}</span><span style={{color:c.accent,fontSize:17,fontWeight:700}}>#{r.distId}</span></div><span style={{color:c.muted,fontSize:13}}>{new Date(r.ts).toLocaleString("es-MX")}</span></div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{r.answers.map(function(a,ai){return<div key={ai} style={{display:"flex",alignItems:"center",gap:6,background:c.bg,padding:"6px 10px",borderRadius:8,fontSize:14}}><span style={{color:c.muted,fontWeight:600}}>{ai+1}.</span><span style={{padding:"2px 8px",borderRadius:4,fontWeight:700,background:a.answer==="Sí"?c.greenBg:c.redBg,color:a.answer==="Sí"?c.green:c.red,fontSize:13}}>{a.answer}</span></div>;})}{r.hasPhoto&&r.photos&&<button onClick={function(){sPhotoView(r.photos);}} style={{display:"flex",alignItems:"center",gap:4,background:"#fef3c7",padding:"6px 10px",borderRadius:8,fontSize:14,border:"none",cursor:"pointer",color:"#92400e",fontWeight:600}}>📷 {r.photos.length} foto{r.photos.length>1?"s":""}</button>}{r._key&&<button onClick={function(){deleteResponse(r._key);}} style={{display:"flex",alignItems:"center",gap:4,background:c.redBg,padding:"6px 10px",borderRadius:8,fontSize:14,border:"none",cursor:"pointer",color:c.red,fontWeight:600}}>🗑 Borrar</button>}</div></div>);})}</div>)}
      {photoView&&<div onClick={function(){sPhotoView(null);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}><div style={{background:"white",borderRadius:16,padding:16,maxWidth:500,width:"100%",textAlign:"center",maxHeight:"80vh",overflowY:"auto"}} onClick={function(e){e.stopPropagation();}}>{Array.isArray(photoView)?photoView.map(function(p,i){return <img key={i} src={p} alt={"Foto "+(i+1)} style={{maxWidth:"100%",borderRadius:8,marginBottom:8}}/>;}):<img src={photoView} alt="Evidencia" style={{maxWidth:"100%",borderRadius:8,marginBottom:12}}/>}<button onClick={function(){sPhotoView(null);}} style={{background:c.bg,border:"none",padding:"8px 20px",borderRadius:8,cursor:"pointer",fontSize:15,fontWeight:600,color:c.muted}}>Cerrar</button></div></div>}
